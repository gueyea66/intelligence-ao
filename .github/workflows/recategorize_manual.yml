name: Manual Recategorization

on:
  workflow_dispatch:

jobs:
  recategorize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run recategorization
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/run_recategorization.py apply
