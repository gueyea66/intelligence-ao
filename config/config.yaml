      url: "https://comtradeplus.un.org"
      actif: true
      frequence: "mensuel"
      delai_entre_requetes: 5

    - nom: "ITC Trade Map"
      url: "https://www.trademap.org"
      actif: true
      frequence: "mensuel"
      delai_entre_requetes: 5

    - nom: "ANSD Sénégal"
      url: "https://www.ansd.sn"
      actif: true
      frequence: "trimestriel"
      delai_entre_requetes: 3

scoring:
  poids:
    pertinence_sectorielle: 25
    taille_marche: 20
    delai_reponse: 15
    accessibilite_geo: 15
    disponibilite_fournisseur: 15
    niveau_concurrence: 10
  seuils:
    priorite_haute: 70
    a_surveiller: 40
    archiver: 0
  positionnements:
    - SOURCING
    - LOGISTIQUE
    - INTERMÉDIATION
    - FORMALISATION
    - FINANCEMENT
    - DIRECT

alertes:
  canaux: ["email"]          # "email" | "whatsapp"
  email: ""                  # à configurer dans .env : ALERT_EMAIL
  whatsapp: ""               # à configurer dans .env : ALERT_WHATSAPP
  frequence_digest: "quotidien"
  score_minimum_alerte: 70

database:
  type: "sqlite"             # "sqlite" | "postgresql"
  sqlite_path: "./data/intelligence.db"
  postgresql_url: ""         # à configurer dans .env : DATABASE_URL

export:
  formats: ["csv", "json", "excel"]
  format_defaut: "excel"
  dossier_sortie: "./exports"

scraping:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  timeout: 30                # secondes
  max_retries: 3
  delai_retry: 10            # secondes entre tentatives

logging:
  niveau: "INFO"             # DEBUG | INFO | WARNING | ERROR
  dossier: "./logs"
  rotation: "quotidien"
  retention_jours: 30
