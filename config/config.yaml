# config.yaml — Fichier maître de configuration
# Toute valeur métier vit ici. Rien n'est hardcodé dans le code.

geo:
  pays_prioritaires: ["Sénégal", "Côte d'Ivoire", "Mali", "Burkina Faso"]
  pays_secondaires: ["Guinée", "Togo", "Bénin", "Niger"]
  zones_informel:
    - nom: "Sandaga"
      ville: "Dakar"
      specialites: ["Textile", "Électronique", "Import Asie"]
      puissance_estimee: "très haute"
    - nom: "Colobane"
      ville: "Dakar"
      specialites: ["Pièces détachées", "Électroménager", "Matériaux"]
      puissance_estimee: "haute"
    - nom: "Marché HLM"
      ville: "Dakar"
      specialites: ["Tissus", "Couture", "Accessoires"]
      puissance_estimee: "haute"
    - nom: "Tilène"
      ville: "Dakar"
      specialites: ["Alimentation", "Produits locaux"]
      puissance_estimee: "moyenne"
    - nom: "Touba"
      ville: "Touba"
      specialites: ["Commerce général", "Import", "Distribution nationale"]
      puissance_estimee: "très haute"

secteurs:
  actifs: []   # vide = tous les secteurs
  exclus: []

