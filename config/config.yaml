      delai_entre_requetes: 3

    - nom: "DgMarket"
      url: "https://www.dgmarket.com"
      actif: true
      frequence: "quotidien"
      delai_entre_requetes: 3

    - nom: "Banque Mondiale"
      url: "https://projects.worldbank.org"
