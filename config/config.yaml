      max_pages: 50
      categories_url: "https://www.jumia.sn/catalog/"

    - nom: "Auchan Sénégal"
      url: "https://www.auchan.sn"
      actif: true
      frequence: "hebdomadaire"
      delai_entre_requetes: 3
      max_pages: 30

    - nom: "Facebook Marketplace Dakar"
      url: "https://www.facebook.com/marketplace/dakar"
      actif: true
      frequence: "quotidien"
      delai_entre_requetes: 5
      max_pages: 20

    - nom: "Jotay"
      url: "https://www.jotay.net"
      actif: true
      frequence: "quotidien"
      delai_entre_requetes: 2
      max_pages: 20

    - nom: "CoinAfrique Sénégal"
      url: "https://sn.coinafrique.com"
      actif: true
      frequence: "quotidien"
      delai_entre_requetes: 2
      max_pages: 20

    - nom: "Auchan Sénégal"
      url: "https://www.auchan.sn"
      actif: true
      frequence: "hebdomadaire"
      delai_entre_requetes: 3
      max_pages: 30

  appels_offres:
    - nom: "DCMP Sénégal"
      url: "https://www.dcmp.sn"
      actif: true
      frequence: "quotidien"
      delai_entre_requetes: 3

    - nom: "UNGM"
      url: "https://www.ungm.org"
      actif: true
